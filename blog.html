    .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .blog-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }

    .blog-thumb { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: var(--bg3); }
    .blog-body { padding: 20px; }
    .blog-tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 8px; }
    .blog-title { font-family: var(--font-head); font-size: 1.05rem; font-weight: 700; line-height: 1.4; margin-bottom: 10px; }
    .blog-excerpt { color: var(--muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 14px; }
    .blog-meta { display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; color: var(--muted); }
    .read-more { color: var(--accent); font-weight: 600; font-size: 0.82rem; }
